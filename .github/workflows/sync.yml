name: Sync to RepoMind

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to RepoMind
        run: |
          git config --global user.name "lovable-sync-bot"
          git config --global user.email "actions@github.com"
          git remote add repomind https://x-access-token:${{ secrets.REPO_SYNC_TOKEN }}@github.com/yooniqx/RepoMind.git
          git push repomind main --force
