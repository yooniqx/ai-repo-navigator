name: Sync to RepoMind

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "repo-sync-bot"
          git config user.email "actions@github.com"

      - name: Push to RepoMind
        env:
          REPO_SYNC_TOKEN: ${{ secrets.REPO_SYNC_TOKEN }}
        run: |
          git remote add repomind https://ghp_${REPO_SYNC_TOKEN}@github.com/yooniqx/RepoMind.git
          git push repomind main --force
